<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Falconer">
  <defs>
    <radialGradient id="fc-aura" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#fff3c9" stop-opacity=".72"/>
      <stop offset=".5" stop-color="#e0a82e" stop-opacity=".32"/>
      <stop offset="1" stop-color="#120d05" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fc-body" x1="50" x2="78" y1="40" y2="112">
      <stop stop-color="#fff0bd"/>
      <stop offset=".5" stop-color="#e7b13b"/>
      <stop offset="1" stop-color="#7a4d12"/>
    </linearGradient>
    <linearGradient id="fc-wingL" x1="14" x2="62" y1="40" y2="64">
      <stop stop-color="#ffe49a"/>
      <stop offset=".6" stop-color="#d49526"/>
      <stop offset="1" stop-color="#5e3a0e"/>
    </linearGradient>
    <linearGradient id="fc-wingR" x1="114" x2="66" y1="40" y2="64">
      <stop stop-color="#ffe49a"/>
      <stop offset=".6" stop-color="#d49526"/>
      <stop offset="1" stop-color="#5e3a0e"/>
    </linearGradient>
    <linearGradient id="fc-bow" x1="20" x2="108" y1="92" y2="112">
      <stop stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#8a5a18"/>
    </linearGradient>
    <filter id="fc-shadow" x="-25%" y="-20%" width="150%" height="155%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <ellipse cx="64" cy="64" rx="53" ry="47" fill="url(#fc-aura)"/>

  <!-- 弓臂（獵人意象） -->
  <g stroke-linecap="round" fill="none">
    <path d="M22 88c-9 7-11 17-7 28" stroke="url(#fc-bow)" stroke-width="5"/>
    <path d="M106 88c9 7 11 17 7 28" stroke="url(#fc-bow)" stroke-width="5"/>
    <path d="M23 91 105 91" stroke="#ffe9a8" stroke-width="2.4" opacity=".75"/>
  </g>

  <g filter="url(#fc-shadow)" stroke-linejoin="round" stroke-linecap="round" stroke="#3a2606">
    <!-- 展開雙翼：層疊羽片，由內而外漸長 -->
    <path d="M60 58C50 46 38 38 25 35c4 6 4 12 1 18 7-3 13-2 18 2-6 2-11 6-14 12 9-5 17-5 24-1z"
          fill="url(#fc-wingL)" stroke-width="3.2"/>
    <path d="M68 58C78 46 90 38 103 35c-4 6-4 12-1 18-7-3-13-2-18 2 6 2 11 6 14 12-9-5-17-5-24-1z"
          fill="url(#fc-wingR)" stroke-width="3.2"/>

    <!-- 尾羽（扇形） -->
    <path d="M56 92l8 22 8-22z" fill="#a86a18" stroke-width="2.6"/>

    <!-- 身體 -->
    <path d="M64 46c9 0 14 9 14 22 0 15-6 30-14 44-8-14-14-29-14-44 0-13 5-22 14-22z"
          fill="url(#fc-body)" stroke-width="3.6"/>
    <!-- 胸羽紋 -->
    <g stroke="#b9842a" stroke-width="1.6" opacity=".7" fill="none">
      <path d="M58 64q6 4 12 0M58 74q6 4 12 0M60 84q4 3 8 0"/>
    </g>

    <!-- 鷹頭（面向前方、銳利） -->
    <path d="M64 32c-8 0-13 6-13 13 0 6 5 11 13 11s13-5 13-11c0-7-5-13-13-13z"
          fill="url(#fc-body)" stroke-width="3.6"/>
    <!-- 凶悍眉羽 -->
    <path d="M52 36c4-4 9-5 12-4M76 36c-4-4-9-5-12-4" fill="none" stroke="#5e3a0e" stroke-width="3"/>
    <!-- 鉤喙（朝下） -->
    <path d="M60 46h8l-4 9c-3-1-4-4-4-9z" fill="#ffcf5c" stroke-width="2.4"/>
    <!-- 發光鷹眼 -->
    <circle cx="58" cy="40" r="2.6" fill="#fff7d6"/>
    <circle cx="70" cy="40" r="2.6" fill="#fff7d6"/>
    <circle cx="58" cy="40" r="1.1" fill="#7a3a00"/>
    <circle cx="70" cy="40" r="1.1" fill="#7a3a00"/>
  </g>
</svg>
