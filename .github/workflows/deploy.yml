name: Deploy to GitHub Pages

on:
  push:
    branches: 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn' # 1. 這裡改成快取 yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile # 2. 使用 yarn 安裝，確保版本與 yarn.lock 一致

      - name: Build
        run: yarn build # 3. 使用 yarn 打包

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Line Notification
        env:
          LINE_MESSAGING_KEY: ${{ secrets.LINE_MESSAGING_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          jq -n \
            --arg to "C3d37554ef8db4ee6ef34302d5656f4c6" \
            --arg msg "$COMMIT_MSG" \
            '{to: $to, messages: [{type: "text", text: $msg}]}' | \
          curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_MESSAGING_KEY" \
            -d @-

